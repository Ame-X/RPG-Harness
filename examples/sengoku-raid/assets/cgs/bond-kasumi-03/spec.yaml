kind: cg
description: |
  霞との邦絆頂点 CG。朝、山際の尾根道。霞が主人公のすぐ隣に立ち、
  足元の鹿の蹄の跡を指差す——鬼の足跡を避けて回り込む三つの蹄跡。
  二人の距離は近く、霞は明るく笑っている。
